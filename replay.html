<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Replay - Wake Sector Bot Learning</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>WAKE SECTOR / bot learning</h1>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="replay.html" class="on">Replays</a>
    <a href="gym.html">Web Gym</a>
    <a href="train.html">Train</a>
    <a href="play/index.html">Play</a>
  </nav>
</header>
<main>
  <div class="toolbar">
    <select id="selMatch"></select>
    <input type="file" id="fileLocal" accept=".ndjson" title="...or open a local record">
    <button id="btnPlay" class="primary">Play</button>
    <select id="selSpeed">
      <option value="1">1x</option><option value="4" selected>4x</option>
      <option value="16">16x</option><option value="64">64x</option>
    </select>
    <input type="range" id="scrub" min="0" max="1000" value="0">
    <span class="mono" id="clock">0:00</span>
  </div>
  <div class="grid" style="grid-template-columns: 1fr 320px">
    <div>
      <canvas id="world" class="world" width="900" height="900"></canvas>
      <p class="dim" id="loadMsg">Pick a match record above (synced by sync.ps1) or open a local .ndjson.</p>
    </div>
    <div>
      <div class="card"><h2>Agents</h2><div id="agents"></div></div>
      <div class="card" style="margin-top:12px"><h2>Event feed</h2><div class="feed" id="feed"></div></div>
    </div>
  </div>
</main>
<script src="js/data.js"></script>
<script src="js/replay.js"></script>
</body>
</html>
